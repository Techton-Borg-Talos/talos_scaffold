# TALOS Local Worker (Phase 1). Single combined worker service.
name: talos-worker
networks:
  worker_net:
    driver: bridge
volumes:
  worker_work:
  worker_cache:
services:
  worker:
    build:
      context: ./app
    container_name: talos_worker
    restart: unless-stopped
    environment:
      PRODUCT_DATABASE_URL: ${PRODUCT_DATABASE_URL}
      LOCAL_WORKER_TOKEN: ${LOCAL_WORKER_TOKEN}
      PRODUCT_WRITEBACK_URL: ${PRODUCT_WRITEBACK_URL}
      PRODUCT_WRITEBACK_TOKEN: ${PRODUCT_WRITEBACK_TOKEN}
      ARTIFACT_ARCHIVE_DIR: /mnt/archive
      DIALPAD_ARCHIVE_DIR: /mnt/dialpad_archive
      DIALPAD_COMPANY_MAP_JSON: ${DIALPAD_COMPANY_MAP_JSON:-}
      DIALPAD_COMPANY_FALLBACK: ${DIALPAD_COMPANY_FALLBACK:-UNMAPPED}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENABLED_MODULES: ${ENABLED_MODULES:-transcription,archive_export,behavior_analysis,contact_engine_local,baseline_updates,deferred_backfill}
    volumes:
      - worker_work:/var/lib/talos/work
      - worker_cache:/root/.cache
      - type: bind
        source: ${DIALPAD_ARCHIVE_HOST_PATH}
        target: /mnt/dialpad_archive
      # - //diskstation/talos-archive:/mnt/archive
    ports:
      - "8081:8081"
    networks: [worker_net]
