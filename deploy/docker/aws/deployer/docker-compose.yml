services:
  deploy_hook:
    build:
      context: ../../../../services/deploy_hook
    container_name: talos_deploy_hook
    restart: unless-stopped
    environment:
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET}
      REPO_DIR: /opt/talos/repo
      COMPOSE_PROJECT: talos-product
      COMPOSE_FILE: /opt/talos/repo/deploy/docker/aws/product/docker-compose.yml
      HEALTHCHECK_URLS: ${HEALTHCHECK_URLS:-http://intake_api:8080/healthz}
      DEPLOY_SERVICES: ${DEPLOY_SERVICES:-postgres_product,intake_api,scheduler,contact_engine,matrix_bridge,caddy}
      REQUIRED_SERVICES: ${REQUIRED_SERVICES:-postgres_product,intake_api,scheduler,contact_engine,matrix_bridge,caddy}
    command: >
      sh -lc 'git config --global --add safe.directory /opt/talos/repo &&
              uvicorn app:app --host 0.0.0.0 --port 8090'
    volumes:
      - ${REPO_HOST_DIR:-/opt/talos/repo}:/opt/talos/repo
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/techton-borg/.ssh:/root/.ssh:ro
    networks:
      - product_net

networks:
  product_net:
    external: true
    name: talos-product_product_net
